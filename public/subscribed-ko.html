    <script>
        (function () {
            var p = new URLSearchParams(location.search);
            var title = document.getElementById('result-title');
            var body = document.getElementById('result-body');
            var err = p.get('error');
            if (p.get('pending') === '1') {
                title.textContent = title.dataset.pendingTitle;
                body.textContent = body.dataset.pendingBody;
            } else if (p.get('already') === '1') {
                title.textContent = title.dataset.alreadyTitle;
                body.textContent = body.dataset.alreadyBody;
            } else if (err === 'expired') {
                title.textContent = title.dataset.expiredTitle;
                body.textContent = body.dataset.expiredBody;
            } else if (err) {
                title.textContent = title.dataset.invalidTitle;
                body.textContent = body.dataset.invalidBody;
            }
        })();
