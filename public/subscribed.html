<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter — Graphic Meat</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#0c0c0f">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site.css?v=8">
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="glow" id="glow"></div>

    <div class="bracket bracket--tl"></div>
    <div class="bracket bracket--tr"></div>
    <div class="bracket bracket--bl"></div>
    <div class="bracket bracket--br"></div>

    <div class="page">
        <nav class="topbar" aria-label="Primary">
            <a class="home" href="/">
                <img src="logo.png" alt="" width="38" height="32" aria-hidden="true">
                <span class="wm">Graphic<b>Meat</b></span>
            </a>
            <a class="back" href="/">&#8592; Back to home</a>
        </nav>

        <main>
            <div class="result-lede">
                <h1 class="page-h1" id="result-title">Subscription confirmed</h1>
                <p class="prose" id="result-body">You're on the list. We'll send the occasional update on what we ship — nothing else.</p>
                <p style="margin-top:1.6rem"><a class="cta" href="/">Back to home <span class="arrow">&#8594;</span></a></p>
            </div>
        </main>

        <footer class="footer">
            <span>graphicmeat.com</span>
            <a href="/">Home</a>
            <a href="/app-privacy">App privacy</a>
            <span>Est. 2013</span>
            <div class="footer-sizzle">
                <span class="sizzle-text">Cooked over an <b>open GPU</b> by</span>
                <a href="/" aria-label="Graphic Meat"><img src="logo.png" alt="Graphic Meat" width="40" height="40"></a>
            </div>
        </footer>
    </div>

    <script src="site.js?v=4" defer></script>
    <script>
        (function () {
            var p = new URLSearchParams(location.search);
            var title = document.getElementById('result-title');
            var body = document.getElementById('result-body');
            var err = p.get('error');
            if (p.get('pending') === '1') {
                title.textContent = 'Almost there';
                body.textContent = "Check your inbox — we've sent a confirmation link. Click it to finish subscribing. (The link expires in 48 hours.)";
            } else if (p.get('already') === '1') {
                title.textContent = "You're already subscribed";
                body.textContent = "Looks like this email is already on the list. Nothing more to do.";
            } else if (err === 'expired') {
                title.textContent = 'Link expired';
                body.textContent = 'That confirmation link has expired. Please subscribe again to get a fresh one.';
            } else if (err) {
                title.textContent = 'Link invalid';
                body.textContent = "That confirmation link is invalid or has already been used. If you think this is a mistake, subscribe again.";
            }
        })();
    </script>
</body>
</html>
